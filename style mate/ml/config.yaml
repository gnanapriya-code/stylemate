# Fashion Model Training Configuration
model:
  name: "fashion_classifier"
  backbone: "resnet50"
  num_classes: 1000
  pretrained: true
  embedding_dim: 256

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0005
  warmup_epochs: 5
  
optimizer:
  type: "adam"  # adam, sgd
  momentum: 0.9
  
scheduler:
  type: "cosine"  # cosine, step
  step_size: 10
  gamma: 0.1

data:
  dataset_paths:
    deepfashion: "dataset/DeepFashion"
    polyvore: "dataset/Polyvore"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  image_size: 256
  num_workers: 4
  
augmentation:
  enabled: true
  random_flip: true
  random_rotation: 15
  color_jitter: true
  
device: "cuda"  # cuda or cpu
seed: 42
